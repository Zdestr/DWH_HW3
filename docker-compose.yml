services:
  pg-master:
    image: postgres:15
    container_name: pg-master
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      REPLICATION_USER: ${REPLICATION_USER}
      REPLICATION_PASSWORD: ${REPLICATION_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata_master:/var/lib/postgresql/data
      - ./init/00_init_replication.sh:/docker-entrypoint-initdb.d/00_init_replication.sh
      - ./init/01_user_service_db.sql:/docker-entrypoint-initdb.d/01_user_service_db.sql
      - ./init/02_order_service_db.sql:/docker-entrypoint-initdb.d/02_order_service_db.sql
      - ./init/03_logistics_service_db.sql:/docker-entrypoint-initdb.d/03_logistics_service_db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - dwh-network

  pg-replica:
    image: postgres:15
    container_name: pg-replica
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      MASTER_HOST: ${MASTER_HOST}
      MASTER_PORT: ${MASTER_PORT}
      REPLICATION_USER: ${REPLICATION_USER}
      REPLICATION_PASSWORD: ${REPLICATION_PASSWORD}
      PGDATA: /var/lib/postgresql/data
    ports:
      - "5433:5432"
    volumes:
      - pgdata_replica:/var/lib/postgresql/data
      - ./replica/init_replica.sh:/init_replica.sh
    depends_on:
      pg-master:
        condition: service_healthy
    entrypoint: ["/bin/bash", "/init_replica.sh"]
    command: ["postgres"]
    networks:
      - dwh-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_4LW_COMMANDS_WHITELIST: "srvr,mntr,ruok,conf"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_logs:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD-SHELL", "cub zk-ready localhost:2181 30 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - dwh-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
    ports:
      - "29092:29092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - dwh-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    ports:
      - "8090:8080"
    networks:
      - dwh-network

  debezium:
    image: debezium/connect:2.4
    container_name: debezium
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      pg-master:
        condition: service_healthy
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: debezium-group
      CONFIG_STORAGE_TOPIC: debezium_configs
      OFFSET_STORAGE_TOPIC: debezium_offsets
      STATUS_STORAGE_TOPIC: debezium_status
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
    ports:
      - "8083:8083"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/connectors || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - dwh-network

  debezium-init:
    image: curlimages/curl:latest
    container_name: debezium-init
    restart: on-failure
    depends_on:
      debezium:
        condition: service_healthy
    volumes:
      - ./debezium/connectors:/connectors
      - ./debezium/init.sh:/init.sh
    entrypoint: ["/bin/sh", "/init.sh"]
    networks:
      - dwh-network

  doris-fe:
    image: apache/doris:fe-4.0.4-slim
    container_name: doris-fe
    hostname: doris-fe
    restart: unless-stopped
    environment:
      - FE_SERVERS=fe1:172.23.0.10:9010
      - FE_ID=1
    ports:
      - "8030:8030"
      - "9030:9030"
    volumes:
      - doris_fe_data:/opt/apache-doris/fe/doris-meta
      - doris_fe_log:/opt/apache-doris/fe/log
      - ./doris/fe.conf:/opt/apache-doris/fe/conf/fe.conf
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8030/api/bootstrap || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
    networks:
      dwh-network:
        ipv4_address: 172.23.0.10

  doris-be:
    image: apache/doris:be-4.0.4-slim
    container_name: doris-be
    entrypoint: ["/bin/bash", "/opt/apache-doris/be/entry_point.sh"]
    hostname: doris-be
    restart: unless-stopped
    depends_on:
      doris-fe:
        condition: service_healthy
    environment:
      - FE_SERVERS=fe1:172.23.0.10:9010
      - BE_ADDR=doris-be:9050
    ports:
      - "8040:8040"
    ulimits:
      nofile:
        soft: 655350
        hard: 655350
    volumes:
      - doris_be_data:/opt/apache-doris/be/storage
      - doris_be_log:/opt/apache-doris/be/log
      - ./doris/be.conf:/opt/apache-doris/be/conf/be.conf
      - ./doris/entry_point.sh:/opt/apache-doris/be/entry_point.sh
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8040/api/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
    networks:
      - dwh-network

  doris-init:
    image: mysql:8.0
    container_name: doris-init
    restart: on-failure
    depends_on:
      doris-be:
        condition: service_healthy
    volumes:
      - ./ddl/dwh_detailed.sql:/dwh_detailed.sql
      - ./presentation/init_presentation.sql:/init_presentation.sql
      - ./doris/init_ddl.sh:/init_ddl.sh
    entrypoint: ["/bin/bash", "/init_ddl.sh"]
    networks:
      - dwh-network

  dmp:
    build:
      context: ./dmp
      dockerfile: Dockerfile
    container_name: dmp
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      doris-be:
        condition: service_healthy
    env_file: .env
    volumes:
      - ./dmp/configs:/app/configs
    networks:
      - dwh-network

  airflow-db:
    image: postgres:15
    container_name: airflow-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - dwh-network

  airflow-init:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    container_name: airflow-init
    restart: on-failure
    depends_on:
      airflow-db:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db/airflow
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'false'
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__WEBSERVER__SECRET_KEY: 'dwh_secret_key_2024'
    command: bash -c "airflow db migrate && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com"
    networks:
      - dwh-network


  airflow-webserver:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    container_name: airflow-webserver
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db/airflow
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'false'
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__WEBSERVER__SECRET_KEY: 'dwh_secret_key_2024'
    ports:
      - "8888:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
    command: webserver
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - dwh-network

  airflow-scheduler:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    container_name: airflow-scheduler
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db/airflow
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'false'
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__WEBSERVER__SECRET_KEY: 'dwh_secret_key_2024'
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
    command: scheduler
    networks:
      - dwh-network

  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 5432
      MB_DB_USER: metabase
      MB_DB_PASS: metabase
      MB_DB_HOST: metabase-db
    depends_on:
      metabase-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
    networks:
      - dwh-network

  metabase-db:
    image: postgres:15
    container_name: metabase-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: metabase
      POSTGRES_PASSWORD: metabase
      POSTGRES_DB: metabase
    volumes:
      - metabase_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metabase"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - dwh-network

volumes:
  pgdata_master:
  pgdata_replica:
  zookeeper_data:
  zookeeper_logs:
  kafka_data:
  doris_fe_data:
  doris_fe_log:
  doris_be_data:
  doris_be_log:
  airflow_db_data:
  airflow_logs:
  metabase_db_data:

networks:
  dwh-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.23.0.0/24
